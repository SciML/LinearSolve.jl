name: "HSL Tests"

on:
  workflow_dispatch:

jobs:
  hsl-tests:
    name: "LinearSolveHSL"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1"
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          GROUP: "LinearSolveHSL"
