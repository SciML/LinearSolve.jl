name: "Tests"

on:
  pull_request:
    branches:
      - main
      - 'release-'
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch || github.ref != 'refs/tags/v*' }}

jobs:
  tests:
    name: "Tests"
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1"
          - "lts"
          - "pre"
        arch:
          - x64
          - x86
        group:
          - "Core"
          - "DefaultsLoading"
          - "LinearSolveSTRUMPACK"
          - "LinearSolveHYPRE"
          - "LinearSolvePETSc"
          - "LinearSolvePardiso"
          - "LinearSolveGinkgo"
          - "LinearSolveElemental"
          - "NoPre"
          - "LinearSolveAutotune"
          - "LinearSolvePyAMG"
          - "Preferences"
          - "Trim"
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        exclude:
          # Don't run trim tests on Julia versions below 1.12
          - group: Trim
            version: "lts"
          - group: Trim
            version: "pre"
          # Force Trim tests onto a single standard CI machine (ubuntu x64)
          - group: Trim
            os: macos-latest
          - group: Trim
            os: windows-latest
          - group: Trim
            arch: x86
          # MKL Pardiso has numerical issues on pre-release Julia
          # See: https://github.com/SciML/LinearSolve.jl/issues/879
          - group: LinearSolvePardiso
            version: "pre"
          # Ginkgo.jl is not available on Windows
          - group: LinearSolveGinkgo
            os: windows-latest
          # Elemental_jll has no Windows binary
          - group: LinearSolveElemental
            os: windows-latest
    uses: "SciML/.github/.github/workflows/tests.yml@v1"
    with:
      group: "${{ matrix.group }}"
      julia-version: "${{ matrix.version }}"
      self-hosted: ${{ matrix.group != 'Trim' }}
      # Coverage processing requires the General registry, which is not
      # reliably available on the self-hosted runners (the
      # `julia-processcoverage` action creates a temp env and tries to
      # `Pkg.add("CoverageTools")`, which fails when the registry is missing).
      # Restrict coverage to the github-hosted Trim job, which is also the
      # only run where the codecov upload step is reachable in practice.
      coverage: ${{ matrix.group == 'Trim' }}
    secrets: "inherit"
