name: "Tests"

on:
  pull_request:
    branches:
      - main
      - 'release-'
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch || github.ref != 'refs/tags/v*' }}

jobs:
  tests:
    name: "Tests"
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1"
          - "lts"
          - "pre"
        arch:
          - x64
          - x86
        group:
          - "Core"
          - "DefaultsLoading"
          - "LinearSolveSTRUMPACK"
          - "LinearSolveHYPRE"
          - "LinearSolvePETSc"
          - "LinearSolvePardiso"
          - "LinearSolveGinkgo"
          - "LinearSolveElemental"
          - "NoPre"
          - "LinearSolveAutotune"
          - "LinearSolvePyAMG"
          - "Preferences"
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        exclude:
          # MKL Pardiso has numerical issues on pre-release Julia
          # See: https://github.com/SciML/LinearSolve.jl/issues/879
          - group: LinearSolvePardiso
            version: "pre"
          # Ginkgo.jl is not available on Windows
          - group: LinearSolveGinkgo
            os: windows-latest
          # Elemental_jll has no Windows binary
          - group: LinearSolveElemental
            os: windows-latest
    uses: "SciML/.github/.github/workflows/tests.yml@v1"
    with:
      group: "${{ matrix.group }}"
      julia-version: "${{ matrix.version }}"
      julia-arch: "${{ matrix.arch }}"
    secrets: "inherit"

  # Keep trim on one fixed GitHub-hosted runner for deterministic compiler availability.
  trim:
    name: "Trim"
    uses: "SciML/.github/.github/workflows/tests.yml@v1"
    with:
      group: "Trim"
      julia-version: "1"
      julia-arch: "x64"
      os: "ubuntu-22.04"
      self-hosted: false
    secrets: "inherit"
