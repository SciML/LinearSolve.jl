name: "Tests"

on:
  pull_request:
    branches:
      - main
      - 'release-'
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch || github.ref != 'refs/tags/v*' }}

jobs:
  tests:
    name: "Tests"
    strategy:
      fail-fast: false
      matrix:
        version:
          - "lts"
          - "1"
          - "pre"
        arch:
          - x64
          - x86
        group:
          - "Core"
          - "DefaultsLoading"
          - "LinearSolveSTRUMPACK"
          - "Preferences"
          - "QA"
          - "NoPre"
          - "LinearSolveHYPRE"
          - "LinearSolvePartitionedSolvers"
          - "LinearSolvePETSc"
          - "LinearSolveMUMPS"
          - "LinearSolvePardiso"
          - "LinearSolveGinkgo"
          - "LinearSolveElemental"
          - "LinearSolveParU"
          - "Trim"
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        exclude:
          # QA runs only on lts + 1 (matches test/test_groups.toml).
          - group: QA
            version: "pre"
          # NoPre is, by definition, not run on prerelease Julia.
          - group: NoPre
            version: "pre"
          # ParU_jll requires Julia >= 1.12; run only on 1 + pre.
          - group: LinearSolveParU
            version: "lts"
          # Force ParU tests onto a single standard CI machine (ubuntu x64).
          - group: LinearSolveParU
            os: macos-latest
          - group: LinearSolveParU
            os: windows-latest
          - group: LinearSolveParU
            arch: x86
          # Don't run trim tests on Julia versions below 1.12.
          - group: Trim
            version: "lts"
          - group: Trim
            version: "pre"
          # Force Trim tests onto a single standard CI machine (ubuntu x64).
          - group: Trim
            os: macos-latest
          - group: Trim
            os: windows-latest
          - group: Trim
            arch: x86
          # MKL Pardiso has numerical issues on pre-release Julia
          # See: https://github.com/SciML/LinearSolve.jl/issues/879
          - group: LinearSolvePardiso
            version: "pre"
          # Skip HYPRE and PETSc on pre-release Julia
          - group: LinearSolveHYPRE
            version: "pre"
          - group: LinearSolvePETSc
            version: "pre"
          # MUMPS, Ginkgo, and Elemental declare [lts, 1] in test/test_groups.toml
          - group: LinearSolveMUMPS
            version: "pre"
          - group: LinearSolveGinkgo
            version: "pre"
          - group: LinearSolveElemental
            version: "pre"
          # MUMPS tests are only wired for Linux
          - group: LinearSolveMUMPS
            os: macos-latest
          - group: LinearSolveMUMPS
            os: windows-latest
          # Restrict MUMPS to standard Linux x64 runners
          - group: LinearSolveMUMPS
            arch: x86
          # PartitionedSolvers and PETSc MPI suites are Linux-only
          - group: LinearSolvePartitionedSolvers
            os: macos-latest
          - group: LinearSolvePartitionedSolvers
            os: windows-latest
          - group: LinearSolvePartitionedSolvers
            version: "pre"
          - group: LinearSolvePETSc
            os: macos-latest
          - group: LinearSolvePETSc
            os: windows-latest
          # Ginkgo.jl is not available on Windows
          - group: LinearSolveGinkgo
            os: windows-latest
          # Elemental_jll has no Windows binary
          - group: LinearSolveElemental
            os: windows-latest
    uses: "SciML/.github/.github/workflows/tests.yml@v1"
    with:
      group: "${{ matrix.group }}"
      julia-version: "${{ matrix.version }}"
      self-hosted: ${{ matrix.group != 'Trim' }}
    secrets: "inherit"

  # GPU group: dep-adding CUDA group (test/gpu/Project.toml) on a self-hosted
  # GPU runner. Folds the former bespoke GPU.yml workflow into a test group.
  gpu:
    name: "GPU"
    runs-on: [self-hosted, gpu-v100]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1"
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          GROUP: "GPU"
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
