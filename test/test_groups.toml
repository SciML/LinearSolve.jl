[NoPre]
versions = ["lts", "1"]
runner = "self-hosted"
num_threads = 2

[LinearSolveHYPRE]
versions = ["lts", "1"]
runner = "self-hosted"
num_threads = 2

[LinearSolvePartitionedSolvers]
versions = ["lts", "1"]
runner = "self-hosted"
num_threads = 2

[LinearSolvePETSc]
versions = ["lts", "1"]
runner = "self-hosted"
num_threads = 2

[LinearSolveMUMPS]
versions = ["lts", "1"]
runner = "self-hosted"
num_threads = 2

[LinearSolvePardiso]
versions = ["lts", "1"]
runner = "self-hosted"
