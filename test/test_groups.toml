# Test group declarations for the LinearSolve root package, consumed by the
# reusable grouped-tests.yml@v1 caller via
# scripts/compute_affected_sublibraries.jl --root-matrix. Each group runs on
# every Julia version it lists; `runner`/`timeout`/`num_threads` set any
# non-default per-group execution settings.
#
# This reproduces the matrix the old hand-maintained Tests.yml ran. That
# workflow declared `os` (ubuntu/macos/windows) and `arch` (x64/x86) matrix
# axes but never forwarded either to the reusable tests.yml -- it passed only
# `self-hosted: ${{ matrix.group != 'Trim' }}`, so every non-Trim cell actually
# executed on a bare `self-hosted` runner (with JULIA_NUM_THREADS auto -> 2)
# regardless of the os/arch axis value, and only Trim ran on GitHub-hosted
# ubuntu-latest. The os/arch axes were therefore dead dimensions; the true
# distinct executions are exactly (group, version), which this file encodes.
#
# Base-environment groups (Core, LinearSolveSTRUMPACK, DefaultsLoading,
# Preferences) run in the package's main test env; `All` runs every base-env
# group. Dep-adding groups carry their extra dependencies in
# test/<group>/Project.toml and are excluded from `All`.

[Core]
versions = ["lts", "1", "pre"]
runner = "self-hosted"
num_threads = 2

[LinearSolveSTRUMPACK]
versions = ["lts", "1", "pre"]
runner = "self-hosted"
num_threads = 2

[DefaultsLoading]
versions = ["lts", "1", "pre"]
runner = "self-hosted"
num_threads = 2

[Preferences]
versions = ["lts", "1", "pre"]
runner = "self-hosted"
num_threads = 2

